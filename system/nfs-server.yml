version: '3.8'

services:
  nfs-server:
    image: docker:rc
    environment:
      - NFS_SHARE_PATH
    command: sh -c "docker run -d --name nfs --privileged --net=host --restart unless-stopped -v $$(echo $$NFS_SHARE_PATH):/nfsshare -e SHARED_DIRECTORY=/nfsshare itsthenetwork/nfs-server-alpine:latest-arm"
    volumes:
      - /home/adefalco/data/upload-dir/:$NFS_SHARE_PATH
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nfs_network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          #- node.hostname == manager1
      restart_policy:
        condition: none

networks:
  nfs_network:
    driver: overlay