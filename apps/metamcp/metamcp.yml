x-default-opts: &default-opts
  env_file:
    .env
  logging:
    options:
      max-size: "1m"
    # driver: "gelf"
    # options:
    #   gelf-address: "udp://172.17.0.1:12201"

services:
  app:
    <<: *default-opts
    image: ghcr.io/metatool-ai/metamcp:${METAMCP_TAG}
    networks:
      - metamcp_network
      - proxy_network
    environment:
      NEXT_PUBLIC_APP_URL: ${APP_URL}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        traefik.enable: "true"
        traefik.http.routers.metamcp.entrypoints: ${ENTRYPOINT:-websecure}
        traefik.http.routers.metamcp.rule: Host(`${DOMAIN:-metamcp.host.local}`)
        traefik.http.routers.metamcp.service: metamcp
        traefik.http.services.metamcp.loadbalancer.server.port: 12008

  postgres:
    <<: *default-opts
    image: postgres:${POSTGRES_TAG}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - metamcp_network
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure

  backup:
    <<: *default-opts
    image: postgres:${POSTGRES_TAG}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - backup:/backup
    command: > 
      - sh
      - -c
      - | 
        echo "[$$(date +'%Y-%m-%d %H:%M:%S')] Backup service started.;
        while true; do
          pg_dump -U ${POSTGRES_USER} -d ${POSTGRES_DB} | gzip > /backup/metamcp_backup_\$(date +%Y%m%d_%H%M%S).sql.gz
          find /backup -name 'metamcp_backup_*.sql.gz' -mtime +${RETENTION_DAYS:-14} -delete
          echo "[$$(date +'%Y-%m-%d %H:%M:%S')] Backup completed. Next backup in $$BACKUP_FREQUENCY.";
          sleep ${BACKUP_FREQUENCY:-24h}
        done
    deploy:
      restart_policy:
        condition: on-failure
        delay: 600s

networks:
  proxy_network:
    external: true
  
  metamcp_network:
    driver: overlay

volumes:
  postgres_data:
    driver: local
    driver_opts:
      device: ${HOST_POSTGRES_DATA}
      type: none
      o: bind
  
  backup:
    driver: local
    driver_opts:
      device: ${HOST_BACKUP_PATH}
      type: none
      o: bind