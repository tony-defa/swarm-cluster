version: '3.8'

services:
  wordpress:
    image: wordpress
    networks:
      - public_network
      - wp_network
    volumes:
      - wordpress_data:/var/www/html
    environment:
      - WORDPRESS_DB_HOST=wordpress-db
    deploy:
      mode: replicated
      replicas: 1
      labels:
        traefik.enable: "true"
        traefik.http.routers.wordpress.entrypoints: websecure
        traefik.http.routers.wordpress.rule: Host(`${EXTERNAL_DOMAIN?Variable not set}`)
        traefik.http.routers.wordpress.service: wordpress
        traefik.http.services.wordpress.loadbalancer.server.port: 80

  wordpress-db:
    image: mysql:5.7
    networks:
      - wp_network
    volumes:
      - wordpress_db:/var/lib/mysql
    deploy:
      mode: replicated
      replicas: 1
      
networks:
  public_network:
    external: true
    
  wp_network:
    driver: overlay

volumes:
  wordpress_data:
    driver: local
    driver_opts:
      device: ${HOST_WORDPRESS_DATA}
      type: none
      o: bind
      # device: ":${HOST_WORDPRESS_DATA?Variable not set}"
      # type: nfs
      # o: addr=${NFS_SHARE_IP?Variable not set},rw,sync,nfsvers=4.1

  wordpress_db:
    driver: local
    driver_opts:
      device: ${HOST_WORDPRESS_DB}
      type: none
      o: bind
      # device: ":${HOST_WORDPRESS_DB?Variable not set}"
      # type: nfs
      # o: addr=${NFS_SHARE_IP?Variable not set},rw,sync,nfsvers=4.1